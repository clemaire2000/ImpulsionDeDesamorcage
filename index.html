<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>BJ-589 — Impulsions de Désamorçage</title>
  <style>
    :root{
      --bg:#0b0f14;
      --panel:#101824;
      --text:#e8eef8;
      --muted:#8aa0bd;
      --good:#3cff84;
      --warn:#ffce3c;
      --bad:#ff4d4d;
      --accent:#4aa3ff;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: radial-gradient(1200px 700px at 50% -10%, #18263a 0%, var(--bg) 55%);
      color:var(--text);
      display:flex;
      min-height:100vh;
      align-items:center;
      justify-content:center;
      padding:16px;
    }
    .wrap{
      width:min(980px, 100%);
      display:grid;
      grid-template-columns: 340px 1fr;
      gap:14px;
    }
    @media (max-width: 900px){
      .wrap{grid-template-columns: 1fr}
    }

    .panel{
      background: linear-gradient(180deg, #111b2a 0%, var(--panel) 100%);
      border:1px solid rgba(255,255,255,.08);
      border-radius:16px;
      padding:14px;
      box-shadow: 0 12px 30px rgba(0,0,0,.35);
    }
    .title{
      display:flex;
      align-items:center;
      gap:10px;
      margin-bottom:10px;
    }
    .badge{
      font-weight:800;
      letter-spacing:.08em;
      font-size:12px;
      padding:6px 10px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.12);
      background: rgba(74,163,255,.12);
      color:#bfe0ff;
    }
    h1{
      margin:0;
      font-size:16px;
      letter-spacing:.02em;
    }
    .meta{
      color:var(--muted);
      font-size:13px;
      line-height:1.4;
      margin:10px 0 14px;
    }
    .kpis{
      display:grid;
      grid-template-columns: repeat(3, 1fr);
      gap:10px;
      margin:10px 0 12px;
    }
    .kpi{
      border:1px solid rgba(255,255,255,.08);
      border-radius:12px;
      padding:10px;
      background: rgba(0,0,0,.15);
    }
    .kpi .label{color:var(--muted); font-size:12px}
    .kpi .value{font-size:20px; font-weight:800; margin-top:4px}
    .kpi .value.good{color:var(--good)}
    .kpi .value.warn{color:var(--warn)}
    .kpi .value.bad{color:var(--bad)}
    .row{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-top:10px;
    }
    button{
      appearance:none;
      border:none;
      cursor:pointer;
      padding:10px 12px;
      border-radius:12px;
      font-weight:700;
      color:var(--text);
      background: rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.14);
    }
    button.primary{
      background: linear-gradient(180deg, rgba(74,163,255,.25), rgba(74,163,255,.12));
      border-color: rgba(74,163,255,.35);
    }
    button.danger{
      background: linear-gradient(180deg, rgba(255,77,77,.20), rgba(255,77,77,.10));
      border-color: rgba(255,77,77,.35);
    }
    button:disabled{
      opacity:.45;
      cursor:not-allowed;
    }
    .small{
      font-size:12px;
      color:var(--muted);
      margin-top:10px;
      line-height:1.35;
    }
    .codeBox{
      margin-top:12px;
      padding:10px;
      border-radius:12px;
      border:1px dashed rgba(255,255,255,.22);
      background: rgba(0,0,0,.18);
      min-height:64px;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      font-weight:800;
      letter-spacing:.12em;
    }
    .codeBox.revealed{
      border-color: rgba(60,255,132,.5);
      background: rgba(60,255,132,.08);
      color: var(--good);
    }

    /* Game board */
    .board{
      position:relative;
      height: min(520px, 72vh);
      border-radius:16px;
      overflow:hidden;
      border:1px solid rgba(255,255,255,.08);
      background:
        radial-gradient(900px 500px at 40% 10%, rgba(74,163,255,.22), transparent 60%),
        radial-gradient(700px 450px at 70% 80%, rgba(60,255,132,.10), transparent 60%),
        linear-gradient(180deg, rgba(255,255,255,.03), rgba(0,0,0,.12));
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.04);
    }
    .scanline{
      position:absolute;
      left:-10%;
      width:120%;
      height:3px;
      background: rgba(74,163,255,.35);
      filter: blur(.2px);
      animation: scan 2.2s linear infinite;
      opacity:.7;
    }
    @keyframes scan{
      0%{top:-10px}
      100%{top: calc(100% + 10px)}
    }
    .target{
      position:absolute;
      width:54px;
      height:54px;
      border-radius:999px;
      display:grid;
      place-items:center;
      user-select:none;
      cursor:pointer;
      transform: translate(-50%, -50%);
      background:
        radial-gradient(circle at 30% 30%, rgba(255,255,255,.35), rgba(255,255,255,.05) 45%, rgba(0,0,0,.25) 72%),
        radial-gradient(circle at 50% 50%, rgba(60,255,132,.30), rgba(60,255,132,.08) 60%, rgba(0,0,0,.10) 85%);
      border:1px solid rgba(60,255,132,.55);
      box-shadow: 0 10px 22px rgba(0,0,0,.35);
      font-weight:900;
      color:#dfffea;
    }
    .target::after{
      content:"";
      position:absolute;
      inset:-10px;
      border-radius:999px;
      border:1px solid rgba(60,255,132,.22);
      animation: pulse 1s ease-out infinite;
    }
    @keyframes pulse{
      0%{transform:scale(.85); opacity:.2}
      70%{transform:scale(1.08); opacity:.35}
      100%{transform:scale(1.18); opacity:0}
    }

    .dangerTarget{
      background:
        radial-gradient(circle at 30% 30%, rgba(255,255,255,.28), rgba(255,255,255,.05) 45%, rgba(0,0,0,.25) 72%),
        radial-gradient(circle at 50% 50%, rgba(255,77,77,.30), rgba(255,77,77,.10) 60%, rgba(0,0,0,.10) 85%);
      border:1px solid rgba(255,77,77,.55);
      color:#ffe1e1;
    }
    .dangerTarget::after{border-color: rgba(255,77,77,.22)}

    .toast{
      position:absolute;
      left:50%;
      top:12px;
      transform:translateX(-50%);
      padding:8px 12px;
      border-radius:999px;
      background: rgba(0,0,0,.35);
      border:1px solid rgba(255,255,255,.12);
      color: var(--muted);
      font-size:13px;
      pointer-events:none;
      opacity:0;
      transition: opacity .18s ease;
    }
    .toast.show{opacity:1}
  </style>
</head>
<body>
  <div class="wrap">
    <aside class="panel">
      <div class="title">
        <span class="badge">BJ-589</span>
        <h1>Impulsions de Désamorçage</h1>
      </div>

      <div class="meta">
        Stabilisez le système en capturant les <b>impulsions vertes</b>.
        Évitez les <b>anomalies rouges</b> (elles pénalisent).
      </div>

      <div class="kpis">
        <div class="kpi">
          <div class="label">Temps</div>
          <div id="time" class="value warn">—</div>
        </div>
        <div class="kpi">
          <div class="label">Score</div>
          <div id="score" class="value good">0</div>
        </div>
        <div class="kpi">
          <div class="label">Erreur</div>
          <div id="miss" class="value bad">0</div>
        </div>
      </div>

      <div class="row">
        <button id="startBtn" class="primary">Démarrer</button>
        <button id="resetBtn">Réinitialiser</button>
       
      </div>

      <div class="small">
        🎯 Objectif : atteindre <b id="goalText">35</b> points avant la fin du temps.<br/>
        Astuce : visez vite, mais ne clique pas n’importe où.
      </div>

      <div id="codeBox" class="codeBox">
        CODE : — — — —
      </div>

      
    </aside>

    <main class="board panel" id="board">
      <div class="scanline"></div>
      <div class="toast" id="toast">Prêt.</div>
    </main>
  </div>

  <script>
    // ====== PERSONNALISATION ======
    const REVEAL_CODE = 5624;     // <-- Mets ici le vrai code à afficher
    const GOAL_SCORE = 35;            // <-- Score requis
    const ROUND_SECONDS = 35;         // <-- Durée de manche

    // difficulté (modifiable par bouton)
    let spawnEveryMs = 650;           // fréquence d'apparition
    let lifeMs = 900;                // durée de vie d'une impulsion
    let dangerChance = 0.28;          // probabilité de cible rouge

    // ====== STATE ======
    const board = document.getElementById("board");
    const timeEl = document.getElementById("time");
    const scoreEl = document.getElementById("score");
    const missEl = document.getElementById("miss");
    const codeBox = document.getElementById("codeBox");
    const goalText = document.getElementById("goalText");
    const toast = document.getElementById("toast");
    const startBtn = document.getElementById("startBtn");
    const resetBtn = document.getElementById("resetBtn");
    const hardBtn = document.getElementById("hardBtn");

    goalText.textContent = GOAL_SCORE;

    let running = false;
    let score = 0;
    let miss = 0;
    let tLeft = ROUND_SECONDS;

    let tickTimer = null;
    let spawnTimer = null;

    function showToast(msg){
      toast.textContent = msg;
      toast.classList.add("show");
      clearTimeout(showToast._t);
      showToast._t = setTimeout(()=> toast.classList.remove("show"), 900);
    }

    function setHud(){
      timeEl.textContent = `${tLeft}s`;
      scoreEl.textContent = score;
      missEl.textContent = miss;
      timeEl.className = "value " + (tLeft <= 10 ? "bad" : "warn");
    }

    function clearTargets(){
      board.querySelectorAll(".target").forEach(n => n.remove());
    }

    function revealCode(){
      codeBox.textContent = `CODE : ${REVEAL_CODE}`;
      codeBox.classList.add("revealed");
      showToast("Protocole validé ✅");
    }

    function hideCode(){
      codeBox.textContent = "CODE : — — — —";
      codeBox.classList.remove("revealed");
    }

    function endRound(win){
      running = false;
      startBtn.disabled = false;
      clearInterval(tickTimer);
      clearInterval(spawnTimer);
      clearTargets();

      if(win){
        revealCode();
      } else {
        showToast("Temps écoulé. Recommence.");
      }
    }

    function spawn(){
      if(!running) return;

      const rect = board.getBoundingClientRect();
      const pad = 40;
      const x = pad + Math.random() * (rect.width - pad*2);
      const y = pad + Math.random() * (rect.height - pad*2);

      const isDanger = Math.random() < dangerChance;
      const el = document.createElement("div");
      el.className = "target" + (isDanger ? " dangerTarget" : "");
      el.style.left = x + "px";
      el.style.top = y + "px";
      el.textContent = isDanger ? "!" : "✓";

      const born = Date.now();
      const ttl = lifeMs + (Math.random()*180 - 90);

      const kill = () => {
        if(el.isConnected) el.remove();
      };

      const onClick = (e) => {
        e.stopPropagation();
        if(!running) return;

        if(isDanger){
          score = Math.max(0, score - 2);
          miss++;
          showToast("Anomalie ! (-2)");
        } else {
          score += 1;
          showToast("+1");
        }
        setHud();
        kill();

        if(score >= GOAL_SCORE){
          endRound(true);
        }
      };

      el.addEventListener("click", onClick);
      board.appendChild(el);

      // auto-despawn
      const loop = () => {
        if(!el.isConnected) return;
        if(!running) { kill(); return; }
        if(Date.now() - born >= ttl){
          // manqué si c'était une bonne impulsion
          if(!isDanger) miss++;
          setHud();
          kill();
          return;
        }
        requestAnimationFrame(loop);
      };
      requestAnimationFrame(loop);
    }

    // click “dans le vide” = petite pénalité (évite spam click)
    board.addEventListener("click", () => {
      if(!running) return;
      miss++;
      score = Math.max(0, score - 1);
      showToast("Tir à vide (-1)");
      setHud();
    });

    function start(){
      if(running) return;
      running = true;
      score = 0; miss = 0;
      tLeft = ROUND_SECONDS;
      hideCode();
      setHud();
      startBtn.disabled = true;
      showToast("Go !");

      tickTimer = setInterval(() => {
        if(!running) return;
        tLeft--;
        setHud();
        if(tLeft <= 0){
          endRound(false);
        }
      }, 1000);

      spawnTimer = setInterval(spawn, spawnEveryMs);
    }

    function reset(){
      running = false;
      clearInterval(tickTimer);
      clearInterval(spawnTimer);
      score = 0; miss = 0;
      tLeft = ROUND_SECONDS;
      hideCode();
      clearTargets();
      setHud();
      startBtn.disabled = false;
      showToast("Réinitialisé.");
    }

    let hard = false;
    function toggleHard(){
      hard = !hard;
      if(hard){
        spawnEveryMs = 520;
        lifeMs = 780;
        dangerChance = 0.24;
        hardBtn.textContent = "Mode normal";
        showToast("Mode + dur activé");
      } else {
        spawnEveryMs = 650;
        lifeMs = 900;
        dangerChance = 0.18;
        hardBtn.textContent = "Mode + dur";
        showToast("Mode normal");
      }
      if(running){
        clearInterval(spawnTimer);
        spawnTimer = setInterval(spawn, spawnEveryMs);
      }
    }

    startBtn.addEventListener("click", start);
    resetBtn.addEventListener("click", reset);
    hardBtn.addEventListener("click", toggleHard);

    setHud();
    showToast("Prêt.");
  </script>
</body>
</html>
